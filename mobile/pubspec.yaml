name: mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # MVP Dependencies (Phase 1a)
  geolocator: ^12.0.0
  url_launcher: ^6.3.0
  http: ^1.2.1

  # Phase 1b: Security and Cryptography
  cryptography: ^2.7.0         # For X25519 key generation
  flutter_secure_storage: ^9.0.0 # For storing the private key securely

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true